name: lint workflow files

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest

permissions: {}

jobs:
  actionlint:
    name: actionlint
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows
            .github/actions
          sparse-checkout-cone-mode: false
      - shell: bash
        run: |
          set -euo pipefail
          cat > aqua.yaml <<'EOF'
          checksum:
            enabled: true
          registries:
            - type: standard
              ref: v4.529.1 # renovate: depName=aquaproj/aqua-registry
          packages:
            - name: rhysd/actionlint@v1.7.12
          EOF
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1
      - shell: bash
        run: |
          set -euo pipefail
          actionlint -color

  ghalint:
    name: ghalint
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows
            .github/actions
          sparse-checkout-cone-mode: false
      - shell: bash
        run: |
          set -euo pipefail
          cat > aqua.yaml <<'EOF'
          checksum:
            enabled: true
          registries:
            - type: standard
              ref: v4.529.1 # renovate: depName=aquaproj/aqua-registry
          packages:
            - name: suzuki-shunsuke/ghalint@v1.5.6
          EOF
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1
      - shell: bash
        run: |
          set -euo pipefail
          ghalint run

  zizmor:
    name: zizmor
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows
            .github/actions
          sparse-checkout-cone-mode: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # Set to true if GitHub Advanced Security is available
          advanced-security: false

  ghasec:
    name: ghasec
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows
            .github/actions
          sparse-checkout-cone-mode: false
      - uses: koki-develop/ghasec-action@2810775d2a300cb3fd9583c36c05b5ee3310c5b8 # v1.1.1
