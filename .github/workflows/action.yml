name: lint workflow files

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest

permissions: {}

jobs:
  actionlint:
    name: actionlint
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows
            .github/actions
          sparse-checkout-cone-mode: false
      - uses: rhysd/actionlint@887273ce9b41efa6e6d9f2dfa0b4b68d7b2d4aeb # v1.7.12
        with:
          flags: "-color"

  ghalint:
    name: ghalint
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows
            .github/actions
          sparse-checkout-cone-mode: false
      - uses: suzuki-shunsuke/ghalint-action@c8d3c0dcc9152f1d1c7d4a38cbf4953c3a55953d # v1.0.0
        with:
          version: v1.5.4

  zizmor:
    name: zizmor
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows
            .github/actions
          sparse-checkout-cone-mode: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # Set to true if GitHub Advanced Security is available
          advanced-security: false

  ghasec:
    name: ghasec
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows
            .github/actions
          sparse-checkout-cone-mode: false
      - uses: koki-develop/ghasec-action@8c7b89eedb0e06040f9085b6748ef38f5e39c8e4 # v0.5.0
