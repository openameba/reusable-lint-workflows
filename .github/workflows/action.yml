name: lint workflow files

on:
  workflow_call:
    inputs:
      runner:
        description: |
          The value passed to runs-on, as a JSON string.
          Single label: '"ubuntu-latest"'. Multiple labels: '["self-hosted", "linux"]'.
        type: string
        default: '"ubuntu-latest"'
      extra-paths:
        description: |
          Extra newline-separated paths to add to sparse-checkout,
          for repos whose actions or lint config live outside
          .github/workflows and .github/actions (e.g. custom action dirs,
          .github/actionlint.yml).
        type: string
        default: ''

permissions: {}

jobs:
  actionlint:
    name: actionlint
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows
            .github/actions
            ${{ inputs.extra-paths }}
          sparse-checkout-cone-mode: false
      - shell: bash
        run: |
          set -euo pipefail
          cat > aqua.yaml <<'EOF'
          checksum:
            enabled: true
          registries:
            - type: standard
              ref: v4.532.0 # renovate: depName=aquaproj/aqua-registry
          packages:
            - name: rhysd/actionlint@v1.7.12
          EOF
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1
      - shell: bash
        run: |
          set -euo pipefail
          actionlint -color

  ghalint:
    name: ghalint
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows
            .github/actions
            ${{ inputs.extra-paths }}
          sparse-checkout-cone-mode: false
      - shell: bash
        run: |
          set -euo pipefail
          cat > aqua.yaml <<'EOF'
          checksum:
            enabled: true
          registries:
            - type: standard
              ref: v4.532.0 # renovate: depName=aquaproj/aqua-registry
          packages:
            - name: suzuki-shunsuke/ghalint@v1.5.6
          EOF
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1
      - shell: bash
        run: |
          set -euo pipefail
          ghalint run

  zizmor:
    name: zizmor
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows
            .github/actions
            ${{ inputs.extra-paths }}
          sparse-checkout-cone-mode: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # Set to true if GitHub Advanced Security is available
          advanced-security: false

  ghasec:
    name: ghasec
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/workflows
            .github/actions
            ${{ inputs.extra-paths }}
          sparse-checkout-cone-mode: false
      - uses: koki-develop/ghasec-action@2810775d2a300cb3fd9583c36c05b5ee3310c5b8 # v1.1.1
